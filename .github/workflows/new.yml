name: Add PR to Project Board
on:
  workflow_call:
    secrets:
      PROJECTS_SECRET:
        required: true
jobs:
  add-to-project:
    uses: adapt-security/.github/.github/workflows/addtoproject.yml@main
    with:
      project-url: https://github.com/orgs/adapt-security/projects/5
    secrets:
      ADDTOPROJECT_TOKEN: ${{ secrets.PROJECTS_SECRET }}
